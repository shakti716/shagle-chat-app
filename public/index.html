<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shagle - Random Video Chat</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💬</text></svg>">
</head>
<body>
  <div id="container">
    <h1>Shagle</h1>
    <p style="color: #7f8c8d; font-size: 0.9em; margin: -10px 0 20px;">Connect with strangers worldwide</p>
    <div id="status">Finding someone to chat with...</div>
    <div id="chat">
      <div id="videos">
        <video id="localVideo" autoplay muted></video>
        <video id="remoteVideo" autoplay></video>
      </div>
      <div id="messages"></div>
      <div style="display: flex; justify-content: center; align-items: center; flex-wrap: wrap;">
        <input type="text" id="messageInput" placeholder="Type your message..." disabled>
        <button id="sendButton" disabled>Send</button>
      </div>
      <div style="display: flex; justify-content: center; align-items: center; flex-wrap: wrap; margin-top: 10px;">
        <button id="videoButton" style="display: none;">📹 Start Video</button>
        <button id="muteButton" style="display: none;">🔇 Mute</button>
        <button id="nextButton" style="display: none;">🔄 Next Chat</button>
        <button id="reportButton" style="display: none;">🚨 Report</button>
      </div>
    </div>
  </div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="client.js"></script>
</body>
</html>
