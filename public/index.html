<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shagle - Random Chat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header>
      <h1>Shagle</h1>
      <p>Random anonymous chat with strangers</p>
    </header>

    <div id="status">Connecting to a stranger...</div>

    <div id="messages"></div>

    <div class="input-row">
      <input id="messageInput" type="text" placeholder="Type your message..." disabled>
      <button id="sendButton" disabled>Send</button>
    </div>

    <div class="actions">
      <button id="nextButton">Next Chat</button>
      <button id="reportButton">Report</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="client.js"></script>
</body>
</html>
