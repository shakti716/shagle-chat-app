<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shagle - Random Chat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="container">
    <h1>Shagle</h1>
    <div id="status">Connecting...</div>
    <div id="chat">
      <div id="videos">
        <video id="localVideo" autoplay muted></video>
        <video id="remoteVideo" autoplay></video>
      </div>
      <div id="messages"></div>
      <input type="text" id="messageInput" placeholder="Type a message..." disabled>
      <button id="sendButton" disabled>Send</button>
      <button id="nextButton" style="display: none;">Next Chat</button>
      <button id="reportButton" style="display: none;">Report</button>
      <button id="videoButton" style="display: none;">Start Video</button>
    </div>
  </div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="client.js"></script>
</body>
</html>
